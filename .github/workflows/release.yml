name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          cp .build/apple/Products/Release/lulu-cli lulu-cli
          chmod +x lulu-cli
          tar czf lulu-cli-${{ github.ref_name }}-macos-universal.tar.gz lulu-cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lulu-cli-*.tar.gz
          generate_release_notes: true
